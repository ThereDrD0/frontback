<section>
  <form id="note-form" class="form">
    <input id="note-input" type="text" placeholder="Введите заметку" required />
    <button type="submit">Добавить</button>
  </form>

  <form id="reminder-form" class="form reminder-form">
    <input id="reminder-text" type="text" placeholder="Текст напоминания" required />
    <input id="reminder-time" type="datetime-local" required />
    <button type="submit">Добавить с напоминанием</button>
  </form>

  <ul id="notes-list" class="notes-list"></ul>
</section>
